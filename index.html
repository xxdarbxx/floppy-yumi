<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Floppy Yumi</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: 'Arial Rounded MT Bold', Arial, sans-serif;
      overflow: hidden;
    }
    canvas {
      display: block;
      border-radius: 16px;
      box-shadow: 0 0 40px rgba(255,180,200,0.4);
      width: min(100vw, calc(100vh * 400 / 600));
      height: min(100vh, calc(100vw * 600 / 400));
    }
  </style>
</head>
<body>
<canvas id="game"></canvas>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

canvas.width = 400;
canvas.height = 600;

// Load Yumi image
const yumiImg = new Image();
yumiImg.src = 'yumi.png';

// Audio
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function resumeAudio() {
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function playFlap() {
  resumeAudio();
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.type = 'sine';
  osc.frequency.setValueAtTime(520, audioCtx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(780, audioCtx.currentTime + 0.06);
  gain.gain.setValueAtTime(0.18, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.12);
  osc.start(); osc.stop(audioCtx.currentTime + 0.12);
}

function playScore() {
  resumeAudio();
  [0, 0.08, 0.16].forEach((t, i) => {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.type = 'triangle';
    const freqs = [660, 880, 1100];
    osc.frequency.setValueAtTime(freqs[i], audioCtx.currentTime + t);
    gain.gain.setValueAtTime(0.15, audioCtx.currentTime + t);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + t + 0.1);
    osc.start(audioCtx.currentTime + t);
    osc.stop(audioCtx.currentTime + t + 0.1);
  });
}

function playDead() {
  resumeAudio();
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.type = 'sawtooth';
  osc.frequency.setValueAtTime(440, audioCtx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(80, audioCtx.currentTime + 0.5);
  gain.gain.setValueAtTime(0.25, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.5);
  osc.start(); osc.stop(audioCtx.currentTime + 0.5);
}

function playHit() {
  resumeAudio();
  const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.1, audioCtx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / data.length);
  const src = audioCtx.createBufferSource();
  const gain = audioCtx.createGain();
  src.buffer = buf;
  src.connect(gain); gain.connect(audioCtx.destination);
  gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
  src.start();
}

// Game state
let state = 'waiting'; // waiting | playing | dead
let score = 0;
let best = 0;
let frame = 0;

// Yumi
const yumi = {
  x: 90,
  y: 280,
  r: 100,
  vy: 0,
  gravity: 0.138,
  flapPower: -4.7,
  rotation: 0,
  wobble: 0,
};

// Pipes
const PIPE_W = 42;
const PIPE_GAP = 297;
const PIPE_SPEED = 1.3;
let pipes = [];
let pipeTimer = 0;
const PIPE_INTERVAL = 100;

// Particles
let particles = [];

// Clouds
let clouds = [
  { x: 80,  y: 80,  r: 30, s: 0.4 },
  { x: 220, y: 50,  r: 22, s: 0.3 },
  { x: 340, y: 100, r: 28, s: 0.5 },
];

// Stars (background)
let stars = Array.from({ length: 40 }, () => ({
  x: Math.random() * 400,
  y: Math.random() * 600,
  r: Math.random() * 1.5 + 0.5,
  a: Math.random(),
}));

function flap() {
  if (state === 'dead') return;
  if (state === 'waiting') state = 'playing';
  yumi.vy = yumi.flapPower;
  yumi.wobble = 1;
  playFlap();
  spawnParticles(yumi.x, yumi.y);
}

function spawnParticles(x, y) {
  for (let i = 0; i < 6; i++) {
    particles.push({
      x, y,
      vx: (Math.random() - 0.5) * 4,
      vy: (Math.random() - 0.5) * 4 - 2,
      life: 1,
      color: `hsl(${Math.random() * 60 + 320}, 100%, 70%)`,
      r: Math.random() * 5 + 2,
    });
  }
}

function spawnPipe() {
  const minY = 120;
  const maxY = canvas.height - 120 - PIPE_GAP;
  const gapY = Math.random() * (maxY - minY) + minY;
  pipes.push({ x: canvas.width + PIPE_W, gapY, scored: false });
}

function reset() {
  yumi.y = 280;
  yumi.vy = 0;
  yumi.rotation = 0;
  yumi.wobble = 0;
  pipes = [];
  particles = [];
  pipeTimer = 0;
  score = 0;
  state = 'waiting';
  frame = 0;
}

// Input
document.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.key === ' ') {
    if (state === 'dead') { reset(); return; }
    flap();
  }
});
let lastFlap = 0;
canvas.addEventListener('click', () => {
  if (state === 'dead') { reset(); return; }
  flap();
});
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const now = Date.now();
  if (now - lastFlap < 200) return; // debounce rapid touches
  lastFlap = now;
  if (state === 'dead') { reset(); return; }
  flap();
}, { passive: false });

// Draw helpers
function drawRoundRect(x, y, w, h, r, fill, stroke) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
  if (fill) { ctx.fillStyle = fill; ctx.fill(); }
  if (stroke) { ctx.strokeStyle = stroke; ctx.lineWidth = 3; ctx.stroke(); }
}

function drawBottle(x, y, w, h, flipped) {
  const cx = x + w / 2;
  const nipW = w * 0.35;
  const nipH = 14;
  const capH = 18;
  const bodyR = 8;

  ctx.save();
  if (flipped) {
    ctx.translate(cx, y + h / 2);
    ctx.scale(1, -1);
    ctx.translate(-cx, -(y + h / 2));
  }

  // Body gradient
  const bg = ctx.createLinearGradient(x, 0, x + w, 0);
  bg.addColorStop(0, '#daf0ff');
  bg.addColorStop(0.35, '#ffffff');
  bg.addColorStop(1, '#b0d8f5');

  // Main bottle body
  drawRoundRect(x, y + nipH + capH, w, h - nipH - capH, bodyR, bg, '#7ab8d8');

  // Milk fill level
  const fillY = y + nipH + capH + (h - nipH - capH) * 0.22;
  const fillH = (h - nipH - capH) * 0.65;
  ctx.save();
  ctx.beginPath();
  ctx.rect(x + 2, fillY, w - 4, fillH);
  ctx.clip();
  const mg = ctx.createLinearGradient(x, fillY, x + w, fillY);
  mg.addColorStop(0, '#fffde8');
  mg.addColorStop(0.5, '#ffffff');
  mg.addColorStop(1, '#f5f0d0');
  ctx.fillStyle = mg;
  ctx.fillRect(x + 2, fillY, w - 4, fillH);
  ctx.restore();

  // Measurement lines
  ctx.strokeStyle = '#a0ccee';
  ctx.lineWidth = 1;
  for (let i = 1; i <= 3; i++) {
    const ly = y + nipH + capH + (h - nipH - capH) * (i / 4);
    ctx.beginPath();
    ctx.moveTo(x + w * 0.65, ly);
    ctx.lineTo(x + w - 4, ly);
    ctx.stroke();
  }

  // Collar / cap ring
  drawRoundRect(x + (w - nipW * 1.5) / 2, y + nipH, nipW * 1.5, capH, 5, '#ffd6e8', '#e8a0c0');

  // Nipple
  ctx.beginPath();
  ctx.moveTo(cx - nipW / 2, y + nipH);
  ctx.bezierCurveTo(cx - nipW / 2, y + 4, cx - nipW / 4, y, cx, y);
  ctx.bezierCurveTo(cx + nipW / 4, y, cx + nipW / 2, y + 4, cx + nipW / 2, y + nipH);
  ctx.closePath();
  ctx.fillStyle = '#f5c2a0';
  ctx.fill();
  ctx.strokeStyle = '#d8956e';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // Nipple hole dot
  ctx.beginPath();
  ctx.arc(cx, y + 3, 2, 0, Math.PI * 2);
  ctx.fillStyle = '#c07850';
  ctx.fill();

  // Shine
  ctx.save();
  ctx.globalAlpha = 0.35;
  ctx.fillStyle = '#fff';
  drawRoundRect(x + 5, y + nipH + capH + 6, 6, (h - nipH - capH) * 0.4, 3, '#fff', null);
  ctx.restore();

  ctx.restore();
}

function drawPipe(pipe) {
  const topH = pipe.gapY;
  const botY = pipe.gapY + PIPE_GAP;
  const botH = canvas.height - botY;
  const px = pipe.x;

  // Top bottle (flipped upside down, nipple points down into gap)
  drawBottle(px, 0, PIPE_W, topH, true);

  // Bottom bottle (normal, nipple points up into gap)
  drawBottle(px, botY, PIPE_W, botH, false);
}

function drawYumi() {
  ctx.save();
  ctx.translate(yumi.x, yumi.y);

  // Tilt based on velocity
  const targetRot = Math.min(Math.max(yumi.vy * 3.5, -30), 80) * Math.PI / 180;
  yumi.rotation += (targetRot - yumi.rotation) * 0.2;
  ctx.rotate(yumi.rotation);

  // Wobble scale on flap
  const wobbleScale = 1 + yumi.wobble * 0.12;
  yumi.wobble *= 0.85;
  ctx.scale(wobbleScale, 1 / wobbleScale);

  const r = yumi.r;

  // Shadow
  ctx.beginPath();
  ctx.ellipse(4, r + 4, r * 0.8, 8, 0, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(0,0,0,0.15)';
  ctx.fill();

  // Draw yumi image or fallback circle
  if (yumiImg.complete && yumiImg.naturalWidth > 0) {
    ctx.drawImage(yumiImg, -r * 1.1, -r * 1.2, r * 2.2, r * 2.4);
  } else {
    // Fallback: cute circle face
    ctx.beginPath();
    ctx.arc(0, 0, r, 0, Math.PI * 2);
    ctx.fillStyle = '#ffd6c0';
    ctx.fill();
    ctx.strokeStyle = '#f0a080';
    ctx.lineWidth = 2;
    ctx.stroke();
    // Eyes
    ctx.fillStyle = '#333';
    ctx.beginPath(); ctx.arc(-10, -5, 4, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(10, -5, 4, 0, Math.PI * 2); ctx.fill();
    // Smile
    ctx.beginPath();
    ctx.arc(0, 5, 10, 0, Math.PI);
    ctx.strokeStyle = '#c0605a';
    ctx.lineWidth = 2;
    ctx.stroke();
  }

  ctx.restore();
}

function drawBackground() {
  // Sky gradient
  const sky = ctx.createLinearGradient(0, 0, 0, canvas.height);
  sky.addColorStop(0, '#a8d8f0');
  sky.addColorStop(1, '#e8f4ff');
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Clouds
  clouds.forEach(c => {
    ctx.save();
    ctx.globalAlpha = 0.85;
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(c.x, c.y, c.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(c.x + c.r * 0.8, c.y + 6, c.r * 0.75, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(c.x - c.r * 0.6, c.y + 8, c.r * 0.6, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
    c.x -= c.s;
    if (c.x + c.r * 2 < 0) c.x = canvas.width + c.r * 2;
  });

  // Ground
  const gnd = ctx.createLinearGradient(0, canvas.height - 60, 0, canvas.height);
  gnd.addColorStop(0, '#8bc34a');
  gnd.addColorStop(0.3, '#6a9e2e');
  gnd.addColorStop(1, '#4a7a1a');
  ctx.fillStyle = gnd;
  ctx.fillRect(0, canvas.height - 60, canvas.width, 60);

  // Ground stripe
  ctx.fillStyle = '#7ab53a';
  ctx.fillRect(0, canvas.height - 60, canvas.width, 12);
}

function drawParticles() {
  particles.forEach((p, i) => {
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.1;
    p.life -= 0.04;
    if (p.life <= 0) { particles.splice(i, 1); return; }
    ctx.save();
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  });
}

function drawHUD() {
  // Score
  ctx.save();
  ctx.shadowColor = 'rgba(0,0,0,0.4)';
  ctx.shadowBlur = 8;
  ctx.fillStyle = '#fff';
  ctx.strokeStyle = '#c0504a';
  ctx.lineWidth = 4;
  ctx.font = 'bold 48px Arial Rounded MT Bold, Arial';
  ctx.textAlign = 'center';
  ctx.strokeText(score, canvas.width / 2, 70);
  ctx.fillText(score, canvas.width / 2, 70);
  ctx.restore();
}

function drawWaitScreen() {
  ctx.save();

  // Pulsing title
  const pulse = 1 + Math.sin(frame * 0.05) * 0.03;
  ctx.save();
  ctx.translate(canvas.width / 2, 120);
  ctx.scale(pulse, pulse);

  ctx.shadowColor = '#ff88aa';
  ctx.shadowBlur = 20;
  ctx.fillStyle = '#fff';
  ctx.strokeStyle = '#d44080';
  ctx.lineWidth = 5;
  ctx.font = 'bold 38px Arial Rounded MT Bold, Arial';
  ctx.textAlign = 'center';
  ctx.strokeText('🌸 Floppy Yumi 🌸', 0, 0);
  ctx.fillText('🌸 Floppy Yumi 🌸', 0, 0);
  ctx.restore();

  // Tap to play
  const alpha = 0.5 + Math.sin(frame * 0.08) * 0.5;
  ctx.globalAlpha = alpha;
  ctx.fillStyle = '#555';
  ctx.font = 'bold 18px Arial';
  ctx.textAlign = 'center';
  ctx.fillText('Tap / Space to fly!', canvas.width / 2, canvas.height / 2 + 110);
  ctx.restore();
}

function drawDeadScreen() {
  // Dim overlay
  ctx.fillStyle = 'rgba(0,0,0,0.45)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  const cx = canvas.width / 2;
  const cy = canvas.height / 2;

  // Panel
  drawRoundRect(cx - 120, cy - 90, 240, 200, 20, '#fff8f0', '#d44080');

  ctx.fillStyle = '#d44080';
  ctx.font = 'bold 28px Arial Rounded MT Bold, Arial';
  ctx.textAlign = 'center';
  ctx.fillText('Game Over!', cx, cy - 52);

  ctx.fillStyle = '#555';
  ctx.font = 'bold 18px Arial';
  ctx.fillText(`Score: ${score}`, cx, cy - 15);
  ctx.fillText(`Best:  ${best}`, cx, cy + 18);

  // Restart button
  drawRoundRect(cx - 70, cy + 48, 140, 44, 12, '#ff80aa', '#d44080');
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 18px Arial Rounded MT Bold, Arial';
  ctx.fillText('Play Again', cx, cy + 76);
}

function checkCollision() {
  const r = yumi.r * 0.38;
  // Ground / ceiling
  if (yumi.y + r > canvas.height - 60 || yumi.y - r < 0) return true;
  // Pipes — use only the pipe body width, not the cap overhang
  for (const p of pipes) {
    const px = p.x, pw = PIPE_W;
    const topH = p.gapY;
    const botY = p.gapY + PIPE_GAP;
    if (yumi.x + r > px && yumi.x - r < px + pw) {
      if (yumi.y - r < topH || yumi.y + r > botY) return true;
    }
  }
  return false;
}

function update() {
  frame++;

  if (state === 'playing') {
    yumi.vy += yumi.gravity;
    yumi.y += yumi.vy;

    pipeTimer++;
    if (pipeTimer >= PIPE_INTERVAL) {
      spawnPipe();
      pipeTimer = 0;
    }

    pipes.forEach(p => {
      p.x -= PIPE_SPEED;
      if (!p.scored && p.x + PIPE_W < yumi.x) {
        p.scored = true;
        score++;
        if (score > best) best = score;
        playScore();
      }
    });
    pipes = pipes.filter(p => p.x + PIPE_W + 10 > 0);

    if (checkCollision()) {
      state = 'dead';
      playHit();
      setTimeout(playDead, 80);
    }
  }

  if (state === 'waiting') {
    yumi.y = 280 + Math.sin(frame * 0.06) * 12;
  }
}

function draw() {
  drawBackground();
  pipes.forEach(drawPipe);
  drawParticles();
  drawYumi();

  if (state === 'playing') drawHUD();
  if (state === 'waiting') drawWaitScreen();
  if (state === 'dead') { drawHUD(); drawDeadScreen(); }
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

yumiImg.onload = () => loop();
yumiImg.onerror = () => loop(); // run with fallback if image missing

loop();
</script>
</body>
</html>
