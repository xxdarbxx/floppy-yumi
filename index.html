<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Floppy Yumi</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body {
      width: 100%; height: 100%;
      background: #1a1a2e;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Arial Rounded MT Bold', Arial, sans-serif;
      overflow: hidden;
      touch-action: none;
    }
    canvas {
      display: block;
      border-radius: 12px;
      box-shadow: 0 0 40px rgba(255,180,200,0.4);
      width: min(100svw, calc(100svh * 400 / 600));
      height: min(100svh, calc(100svw * 600 / 400));
      image-rendering: auto;
    }
  </style>
</head>
<body>
<canvas id="game"></canvas>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
canvas.width = 400;
canvas.height = 600;

// ── Characters ──────────────────────────────────────────────
const CHARACTERS = [
  { file: 'yumi.png',  label: 'Yumi' },
  { file: 'char1.png', label: 'Tito Simon' },
  { file: 'char2.png', label: 'Maymay' },
  { file: 'char3.png', label: 'Tita Kols' },
  { file: 'char4.png', label: 'Tita Tin' },
  { file: 'char5.png', label: 'Yuna' },
  { file: 'char6.png', label: 'Mommy' },
  { file: 'char7.png', label: 'Tita Chuck' },
  { file: 'char8.png', label: 'NayNay' },
  { file: 'char9.png', label: 'Tito Jason' },
];
CHARACTERS.forEach(c => {
  c.img = new Image();
  c.img.src = c.file;
});
let selectedChar = 0;

// ── Audio ────────────────────────────────────────────────────
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function resumeAudio() { if (audioCtx.state === 'suspended') audioCtx.resume(); }

function playFlap() {
  resumeAudio();
  const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.type = 'sine';
  osc.frequency.setValueAtTime(520, audioCtx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(780, audioCtx.currentTime + 0.06);
  gain.gain.setValueAtTime(0.18, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.12);
  osc.start(); osc.stop(audioCtx.currentTime + 0.12);
}

function playScore() {
  resumeAudio();
  [0, 0.08, 0.16].forEach((t, i) => {
    const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.type = 'triangle';
    osc.frequency.setValueAtTime([660, 880, 1100][i], audioCtx.currentTime + t);
    gain.gain.setValueAtTime(0.15, audioCtx.currentTime + t);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + t + 0.1);
    osc.start(audioCtx.currentTime + t);
    osc.stop(audioCtx.currentTime + t + 0.1);
  });
}

function playHit() {
  resumeAudio();
  const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.1, audioCtx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / data.length);
  const src = audioCtx.createBufferSource(), gain = audioCtx.createGain();
  src.buffer = buf; src.connect(gain); gain.connect(audioCtx.destination);
  gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
  src.start();
}

function playCryingBaby() {
  resumeAudio();
  // Crying baby: repeating wail sweeps
  const cries = [
    { start: 0,    dur: 0.35, f0: 380, f1: 620 },
    { start: 0.4,  dur: 0.35, f0: 350, f1: 600 },
    { start: 0.8,  dur: 0.4,  f0: 320, f1: 640 },
    { start: 1.25, dur: 0.45, f0: 300, f1: 660 },
  ];
  cries.forEach(c => {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    const vib = audioCtx.createOscillator();
    const vibGain = audioCtx.createGain();

    // vibrato
    vib.frequency.value = 6;
    vibGain.gain.value = 18;
    vib.connect(vibGain);
    vibGain.connect(osc.frequency);

    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.type = 'sawtooth';
    const t = audioCtx.currentTime + c.start;
    osc.frequency.setValueAtTime(c.f0, t);
    osc.frequency.linearRampToValueAtTime(c.f1, t + c.dur * 0.5);
    osc.frequency.linearRampToValueAtTime(c.f0 * 0.85, t + c.dur);
    gain.gain.setValueAtTime(0, t);
    gain.gain.linearRampToValueAtTime(0.22, t + 0.04);
    gain.gain.setValueAtTime(0.22, t + c.dur - 0.06);
    gain.gain.linearRampToValueAtTime(0, t + c.dur);

    vib.start(t); vib.stop(t + c.dur);
    osc.start(t); osc.stop(t + c.dur);
  });
}

// ── Game state ───────────────────────────────────────────────
let state = 'select'; // select | waiting | playing | dead
let score = 0;
let best = 0;
let frame = 0;

const yumi = {
  x: 90, y: 280, r: 100,
  vy: 0, gravity: 0.138, flapPower: -4.7,
  rotation: 0, wobble: 0,
};

const PIPE_W = 42;
const PIPE_GAP = 297;
const PIPE_SPEED = 2.8;
let pipes = [];
let pipeTimer = 0;
const PIPE_INTERVAL = 72;
let particles = [];

const clouds = [
  { x: 80,  y: 80,  r: 30, s: 0.4 },
  { x: 220, y: 50,  r: 22, s: 0.3 },
  { x: 340, y: 100, r: 28, s: 0.5 },
];

// ── Helpers ──────────────────────────────────────────────────
function drawRoundRect(x, y, w, h, r, fill, stroke) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
  if (fill)   { ctx.fillStyle = fill;     ctx.fill(); }
  if (stroke) { ctx.strokeStyle = stroke; ctx.lineWidth = 3; ctx.stroke(); }
}

// ── Character select screen ──────────────────────────────────
// Layout: 3 columns × 2 rows
const SEL_COLS = 5;
const SEL_ROWS = 2;
const SEL_PAD  = 8;
const SEL_TOP  = 118;
const CELL_W   = (canvas.width - SEL_PAD * (SEL_COLS + 1)) / SEL_COLS;
const CELL_H   = CELL_W * 1.2;

function charCell(i) {
  const col = i % SEL_COLS;
  const row = Math.floor(i / SEL_COLS);
  return {
    x: SEL_PAD + col * (CELL_W + SEL_PAD),
    y: SEL_TOP + row * (CELL_H + SEL_PAD),
    w: CELL_W,
    h: CELL_H,
  };
}

function drawSelectScreen() {
  // Background
  const sky = ctx.createLinearGradient(0, 0, 0, canvas.height);
  sky.addColorStop(0, '#a8d8f0');
  sky.addColorStop(1, '#e8f4ff');
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Title
  const pulse = 1 + Math.sin(frame * 0.05) * 0.025;
  ctx.save();
  ctx.translate(canvas.width / 2, 72);
  ctx.scale(pulse, pulse);
  ctx.shadowColor = '#ff88aa'; ctx.shadowBlur = 18;
  ctx.fillStyle = '#fff'; ctx.strokeStyle = '#d44080'; ctx.lineWidth = 5;
  ctx.font = 'bold 30px Arial Rounded MT Bold, Arial';
  ctx.textAlign = 'center';
  ctx.strokeText('🌸 Floppy Yumi 🌸', 0, 0);
  ctx.fillText('🌸 Floppy Yumi 🌸', 0, 0);
  ctx.restore();

  // Subtitle
  ctx.fillStyle = '#555';
  ctx.font = 'bold 15px Arial';
  ctx.textAlign = 'center';
  ctx.fillText('Choose your character', canvas.width / 2, 105);

  // Character cards
  CHARACTERS.forEach((c, i) => {
    const { x, y, w, h } = charCell(i);
    const selected = i === selectedChar;

    // Card bg
    drawRoundRect(x, y, w, h, 12,
      selected ? '#ffe0f0' : '#ffffffcc',
      selected ? '#d44080'  : '#ccc'
    );
    if (selected) {
      ctx.lineWidth = 3;
      ctx.strokeStyle = '#d44080';
      ctx.stroke();
    }

    // Face image
    if (c.img.complete && c.img.naturalWidth > 0) {
      const imgSize = w * 0.78;
      ctx.drawImage(c.img, x + (w - imgSize) / 2, y + 6, imgSize, imgSize);
    } else {
      ctx.fillStyle = '#ddd';
      ctx.beginPath();
      ctx.arc(x + w / 2, y + h * 0.42, w * 0.3, 0, Math.PI * 2);
      ctx.fill();
    }

    // Label — shrink font to fit long names
    ctx.fillStyle = selected ? '#d44080' : '#444';
    ctx.textAlign = 'center';
    let fontSize = 11;
    ctx.font = `bold ${fontSize}px Arial`;
    while (ctx.measureText(c.label).width > w - 4 && fontSize > 7) {
      fontSize--;
      ctx.font = `bold ${fontSize}px Arial`;
    }
    ctx.fillText(c.label, x + w / 2, y + h - 5);
  });

  // Play button
  const btnY = SEL_TOP + SEL_ROWS * (CELL_H + SEL_PAD) + 10;
  drawRoundRect(canvas.width / 2 - 90, btnY, 180, 48, 14, '#ff80aa', '#d44080');
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 20px Arial Rounded MT Bold, Arial';
  ctx.textAlign = 'center';
  ctx.fillText('▶  Play!', canvas.width / 2, btnY + 32);
}

function handleSelectTap(cx, cy) {
  // Check character cards
  for (let i = 0; i < CHARACTERS.length; i++) {
    const { x, y, w, h } = charCell(i);
    if (cx >= x && cx <= x + w && cy >= y && cy <= y + h) {
      selectedChar = i;
      return;
    }
  }
  // Check play button
  const btnY = SEL_TOP + SEL_ROWS * (CELL_H + SEL_PAD) + 10;
  if (cx >= canvas.width / 2 - 90 && cx <= canvas.width / 2 + 90
      && cy >= btnY && cy <= btnY + 48) {
    state = 'waiting';
  }
}

// Convert canvas-relative click coords (accounts for CSS scaling)
function canvasCoords(e) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width  / rect.width;
  const scaleY = canvas.height / rect.height;
  const src = e.touches ? e.touches[0] : e;
  return {
    x: (src.clientX - rect.left) * scaleX,
    y: (src.clientY - rect.top)  * scaleY,
  };
}

// ── Input ────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.key === ' ') {
    resumeAudio();
    if (state === 'select') { state = 'waiting'; return; }
    if (state === 'dead')   { resetGame(); return; }
    flap();
  }
});

let lastFlap = 0;
canvas.addEventListener('click', e => {
  resumeAudio();
  if (state === 'select') { handleSelectTap(...Object.values(canvasCoords(e))); return; }
  if (state === 'dead')   { resetGame(); return; }
  flap();
});
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  resumeAudio();
  const now = Date.now();
  if (state === 'select') {
    const { x, y } = canvasCoords(e);
    handleSelectTap(x, y);
    return;
  }
  if (state === 'dead') { resetGame(); return; }
  if (now - lastFlap < 200) return;
  lastFlap = now;
  flap();
}, { passive: false });

// ── Game logic ───────────────────────────────────────────────
function flap() {
  if (state === 'dead' || state === 'select') return;
  if (state === 'waiting') state = 'playing';
  yumi.vy = yumi.flapPower;
  yumi.wobble = 1;
  playFlap();
  spawnParticles(yumi.x, yumi.y);
}

function spawnParticles(x, y) {
  for (let i = 0; i < 6; i++) {
    particles.push({
      x, y,
      vx: (Math.random() - 0.5) * 4,
      vy: (Math.random() - 0.5) * 4 - 2,
      life: 1,
      color: `hsl(${Math.random() * 60 + 320}, 100%, 70%)`,
      r: Math.random() * 5 + 2,
    });
  }
}

function spawnPipe() {
  const minY = 120, maxY = canvas.height - 120 - PIPE_GAP;
  pipes.push({ x: canvas.width + PIPE_W, gapY: Math.random() * (maxY - minY) + minY, scored: false });
}

function resetGame() {
  yumi.y = 280; yumi.vy = 0; yumi.rotation = 0; yumi.wobble = 0;
  pipes = []; particles = []; pipeTimer = 0; score = 0;
  state = 'waiting'; frame = 0;
}

// ── Offscreen cache ──────────────────────────────────────────
// Pre-render a bottle tile (upright) of fixed height for slicing
const BOTTLE_TILE_H = 400;
const bottleCache = document.createElement('canvas');
bottleCache.width = PIPE_W; bottleCache.height = BOTTLE_TILE_H;
(function buildBottleCache() {
  const c = bottleCache.getContext('2d');
  const w = PIPE_W, h = BOTTLE_TILE_H;
  const cx = w / 2, nipW = w * 0.35, nipH = 12, capH = 16;
  // Body
  const bg = c.createLinearGradient(0, 0, w, 0);
  bg.addColorStop(0, '#c8e8ff'); bg.addColorStop(0.4, '#ffffff'); bg.addColorStop(1, '#9ecde8');
  c.fillStyle = bg;
  c.beginPath(); c.roundRect(0, nipH + capH, w, h - nipH - capH, 7); c.fill();
  c.strokeStyle = '#6aaace'; c.lineWidth = 2; c.stroke();
  // Milk fill
  const fillY = nipH + capH + (h - nipH - capH) * 0.22;
  const fillH = (h - nipH - capH) * 0.6;
  c.fillStyle = '#fffbe8';
  c.fillRect(2, fillY, w - 4, fillH);
  // Measure lines
  c.strokeStyle = '#90c0de'; c.lineWidth = 1;
  for (let i = 1; i <= 4; i++) {
    const ly = nipH + capH + (h - nipH - capH) * (i / 5);
    c.beginPath(); c.moveTo(w * 0.6, ly); c.lineTo(w - 3, ly); c.stroke();
  }
  // Shine
  c.fillStyle = 'rgba(255,255,255,0.4)';
  c.fillRect(4, nipH + capH + 8, 5, fillH * 0.5);
  // Collar
  c.fillStyle = '#ffd6e8'; c.strokeStyle = '#e8a0c0'; c.lineWidth = 1.5;
  c.beginPath(); c.roundRect(cx - nipW * 0.8, nipH, nipW * 1.6, capH, 4); c.fill(); c.stroke();
  // Nipple
  c.beginPath();
  c.moveTo(cx - nipW / 2, nipH);
  c.bezierCurveTo(cx - nipW / 2, 3, cx - nipW / 4, 0, cx, 0);
  c.bezierCurveTo(cx + nipW / 4, 0, cx + nipW / 2, 3, cx + nipW / 2, nipH);
  c.closePath(); c.fillStyle = '#f5c2a0'; c.fill();
  c.strokeStyle = '#d8956e'; c.lineWidth = 1.2; c.stroke();
  c.beginPath(); c.arc(cx, 2.5, 1.5, 0, Math.PI * 2); c.fillStyle = '#b06840'; c.fill();
})();

// Pre-render static background (sky + ground, no clouds)
const bgCache = document.createElement('canvas');
bgCache.width = canvas.width; bgCache.height = canvas.height;
(function buildBgCache() {
  const c = bgCache.getContext('2d');
  const sky = c.createLinearGradient(0, 0, 0, canvas.height);
  sky.addColorStop(0, '#a8d8f0'); sky.addColorStop(1, '#ddf0ff');
  c.fillStyle = sky; c.fillRect(0, 0, canvas.width, canvas.height);
  const gnd = c.createLinearGradient(0, canvas.height - 60, 0, canvas.height);
  gnd.addColorStop(0, '#8bc34a'); gnd.addColorStop(0.4, '#5a9020'); gnd.addColorStop(1, '#3a6a10');
  c.fillStyle = gnd; c.fillRect(0, canvas.height - 60, canvas.width, 60);
  c.fillStyle = '#7ab53a'; c.fillRect(0, canvas.height - 60, canvas.width, 10);
})();

function drawPipe(pipe) {
  const px = pipe.x, topH = pipe.gapY, botY = pipe.gapY + PIPE_GAP;
  const botH = canvas.height - botY;

  // Top bottle — draw flipped (slice from bottom of tile)
  ctx.save();
  ctx.translate(px + PIPE_W / 2, topH / 2);
  ctx.scale(1, -1);
  ctx.drawImage(bottleCache, 0, 0, PIPE_W, topH, -PIPE_W / 2, -topH / 2, PIPE_W, topH);
  ctx.restore();

  // Bottom bottle — draw upright
  ctx.drawImage(bottleCache, 0, 0, PIPE_W, botH, px, botY, PIPE_W, botH);
}

function drawBackground() {
  // Static bg
  ctx.drawImage(bgCache, 0, 0);
  // Animated clouds only
  clouds.forEach(c => {
    ctx.fillStyle = '#fff';
    ctx.globalAlpha = 0.82;
    ctx.beginPath(); ctx.arc(c.x, c.y, c.r, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(c.x + c.r * 0.8, c.y + 5, c.r * 0.7, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(c.x - c.r * 0.55, c.y + 7, c.r * 0.55, 0, Math.PI * 2); ctx.fill();
    ctx.globalAlpha = 1;
    c.x -= c.s;
    if (c.x + c.r * 2 < 0) c.x = canvas.width + c.r * 2;
  });
}

function drawCharacter() {
  ctx.save();
  ctx.translate(yumi.x, yumi.y);
  const targetRot = Math.min(Math.max(yumi.vy * 3.5, -30), 80) * Math.PI / 180;
  yumi.rotation += (targetRot - yumi.rotation) * 0.2;
  ctx.rotate(yumi.rotation);
  const wobbleScale = 1 + yumi.wobble * 0.12;
  yumi.wobble *= 0.85;
  ctx.scale(wobbleScale, 1 / wobbleScale);
  const r = yumi.r;

  ctx.beginPath();
  ctx.ellipse(4, r + 4, r * 0.8, 8, 0, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(0,0,0,0.15)'; ctx.fill();

  const img = CHARACTERS[selectedChar].img;
  if (img.complete && img.naturalWidth > 0) {
    ctx.drawImage(img, -r * 1.1, -r * 1.2, r * 2.2, r * 2.4);
  } else {
    ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI * 2);
    ctx.fillStyle = '#ffd6c0'; ctx.fill();
  }
  ctx.restore();
}

function drawParticles() {
  particles.forEach((p, i) => {
    p.x += p.vx; p.y += p.vy; p.vy += 0.1; p.life -= 0.04;
    if (p.life <= 0) { particles.splice(i, 1); return; }
    ctx.save(); ctx.globalAlpha = p.life; ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
  });
}

function drawHUD() {
  ctx.save();
  ctx.shadowColor = 'rgba(0,0,0,0.4)'; ctx.shadowBlur = 8;
  ctx.fillStyle = '#fff'; ctx.strokeStyle = '#c0504a'; ctx.lineWidth = 4;
  ctx.font = 'bold 48px Arial Rounded MT Bold, Arial'; ctx.textAlign = 'center';
  ctx.strokeText(score, canvas.width / 2, 70);
  ctx.fillText(score, canvas.width / 2, 70);
  ctx.restore();
}

function drawWaitScreen() {
  ctx.save();
  const pulse = 1 + Math.sin(frame * 0.05) * 0.03;
  ctx.save();
  ctx.translate(canvas.width / 2, 120); ctx.scale(pulse, pulse);
  ctx.shadowColor = '#ff88aa'; ctx.shadowBlur = 20;
  ctx.fillStyle = '#fff'; ctx.strokeStyle = '#d44080'; ctx.lineWidth = 5;
  ctx.font = 'bold 38px Arial Rounded MT Bold, Arial'; ctx.textAlign = 'center';
  ctx.strokeText('🌸 Floppy Yumi 🌸', 0, 0);
  ctx.fillText('🌸 Floppy Yumi 🌸', 0, 0);
  ctx.restore();
  ctx.globalAlpha = 0.5 + Math.sin(frame * 0.08) * 0.5;
  ctx.fillStyle = '#555'; ctx.font = 'bold 18px Arial'; ctx.textAlign = 'center';
  ctx.fillText('Tap / Space to fly!', canvas.width / 2, canvas.height / 2 + 110);
  ctx.restore();
}

function drawDeadScreen() {
  ctx.fillStyle = 'rgba(0,0,0,0.45)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  const cx = canvas.width / 2, cy = canvas.height / 2;
  drawRoundRect(cx - 130, cy - 100, 260, 220, 20, '#fff8f0', '#d44080');

  ctx.fillStyle = '#d44080';
  ctx.font = 'bold 28px Arial Rounded MT Bold, Arial';
  ctx.textAlign = 'center';
  ctx.fillText('Game Over! 😢', cx, cy - 58);

  ctx.fillStyle = '#555'; ctx.font = 'bold 18px Arial';
  ctx.fillText(`Score: ${score}`, cx, cy - 18);
  ctx.fillText(`Best:  ${best}`, cx, cy + 16);

  // Play Again button
  drawRoundRect(cx - 80, cy + 42, 160, 46, 12, '#ff80aa', '#d44080');
  ctx.fillStyle = '#fff'; ctx.font = 'bold 17px Arial Rounded MT Bold, Arial';
  ctx.fillText('Play Again', cx, cy + 71);

  // Change Character button
  drawRoundRect(cx - 80, cy + 98, 160, 40, 12, '#ffe0f0', '#d44080');
  ctx.fillStyle = '#d44080'; ctx.font = 'bold 14px Arial Rounded MT Bold, Arial';
  ctx.fillText('Change Character', cx, cy + 122);
}

function handleDeadTap(cx, cy) {
  const x = canvas.width / 2, y = canvas.height / 2;
  // Play Again
  if (cx >= x - 80 && cx <= x + 80 && cy >= y + 42 && cy <= y + 88) { resetGame(); return; }
  // Change Character
  if (cx >= x - 80 && cx <= x + 80 && cy >= y + 98 && cy <= y + 138) { state = 'select'; return; }
}

// ── Collision ────────────────────────────────────────────────
function checkCollision() {
  const r = yumi.r * 0.38;
  if (yumi.y + r > canvas.height - 60 || yumi.y - r < 0) return true;
  for (const p of pipes) {
    if (yumi.x + r > p.x && yumi.x - r < p.x + PIPE_W) {
      if (yumi.y - r < p.gapY || yumi.y + r > p.gapY + PIPE_GAP) return true;
    }
  }
  return false;
}

// ── Main loop ────────────────────────────────────────────────
function update() {
  frame++;
  if (state === 'select') return;

  if (state === 'playing') {
    yumi.vy += yumi.gravity;
    yumi.y += yumi.vy;
    pipeTimer++;
    if (pipeTimer >= PIPE_INTERVAL) { spawnPipe(); pipeTimer = 0; }
    pipes.forEach(p => {
      p.x -= PIPE_SPEED;
      if (!p.scored && p.x + PIPE_W < yumi.x) {
        p.scored = true; score++;
        if (score > best) best = score;
        playScore();
      }
    });
    pipes = pipes.filter(p => p.x + PIPE_W + 10 > 0);
    if (checkCollision()) {
      state = 'dead';
      playHit();
      setTimeout(playCryingBaby, 120);
    }
  }
  if (state === 'waiting') yumi.y = 280 + Math.sin(frame * 0.06) * 12;
}

function draw() {
  if (state === 'select') { drawSelectScreen(); return; }
  drawBackground();
  pipes.forEach(drawPipe);
  drawParticles();
  drawCharacter();
  if (state === 'playing') drawHUD();
  if (state === 'waiting') drawWaitScreen();
  if (state === 'dead')    { drawHUD(); drawDeadScreen(); }
}

// Override click/touch for dead screen
canvas.addEventListener('click', e => {
  if (state === 'dead') { const { x, y } = canvasCoords(e); handleDeadTap(x, y); }
}, true);
canvas.addEventListener('touchstart', e => {
  if (state === 'dead') { const { x, y } = canvasCoords(e); handleDeadTap(x, y); }
}, { passive: true, capture: true });

function loop() { update(); draw(); requestAnimationFrame(loop); }
loop();
</script>
</body>
</html>
